# Canonical legal references used in TADF audit reports.
# Seeded from the 9 acts originally cited in the project plan + the laws and
# EVS standards Fjodor's existing reports cite + the EVS-EN eurocode set.
#
# The Phase 2 LLM ranker (`tadf.llm.ranker.rank_legal_refs`) picks ONLY from
# this list — never invents new entries. Section_keys are intentionally
# generous (most acts apply to several sections); the ranker re-narrows by
# semantic match. An empty section_keys list means "applicable everywhere".
#
# When a new law is mentioned in a real audit, ADD it here and re-deploy —
# don't paste it directly into a finding.

